<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description" content="Get in touch with us to book your next rafting trip or ask any questions.">
    <meta name="author" content="[Your Name]">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="images/site-logo.png" alt="Rafting Site Logo" class="logo">
        </div>
        <nav class="nav-container">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="title-container">
            <h1>Contact Our Team</h1>
        </div>

        <section class="contact-grid-container">
            <div class="contact-info-box">
                <h2>Our Base Camp</h2>
                <p>123 River Run Road<br>Adventure Valley, ID 83201</p>
                <p><strong>Phone:</strong> (208) 555-RAFT</p>
                <p><strong>Email:</strong> info@whitewaterrafting.com</p>
                
                <div class="map-placeholder" style="margin-top: 20px;">
                    <img src="images/history-raft.jpg" alt="Map to our location" style="opacity: 0.7;">
                </div>
            </div>

            <div class="contact-form-box">
                <h2>Send a Message</h2>
                <form class="contact-form">
                    <div class="form-item">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-item">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-item">
                        <label for="message">Your Question:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Adventure Request</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting | [Your Name]</p>
        <div class="social-container">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="#"><img src="images/linkedin.png" alt="LinkedIn"></a>
        </div>
    </footer>
</body>
</html>
