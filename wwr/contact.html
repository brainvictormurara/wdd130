<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description" content="Contact White Water Rafting for reservations, inquiries, or feedback. We are located in Moab, Utah.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us | White Water Rafting</h1>

        <section class="contact-grid">
            <div class="company-info">
                <h2>Visit Us</h2>
                <p>📍 378 N Main St, Moab, UT 84532</p>
                <p>📞 435-259-8594</p>
                <p>✉️ info@adrift.net</p>
                
                <div class="map-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m1!1m1!1m1" width="600" height="450" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>

        <section class="team">
            <h2>Meet Our Guides</h2>
            <div class="employee-profiles">
                <figure>
                    <img src="images/employee1.jpg" alt="Manager">
                    <figcaption>Alex Riverton - Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Guide">
                    <figcaption>Sarah Splash - Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Safety">
                    <figcaption>Buck Oarman - Safety Specialist</figcaption>
                </figure>
            </div>
        </section>

        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <label for="username">Full Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="useremail">Email Address:</label>
                <input type="email" id="useremail" name="useremail" required>

                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label><input type="radio" id="general" name="purpose" value="general"> General Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose" value="reservation"> Reservation Question</label>
                    <label><input type="radio" id="suggestion" name="purpose" value="suggestion"> Website Suggestion</label>
                </fieldset>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5"></textarea>

                <label class="newsletter">
                    <input type="checkbox" id="subscribe" name="subscribe"> Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>©2026 | Brain Victor Murara | WDD 130</p>
        </footer>
</body>
</html>
