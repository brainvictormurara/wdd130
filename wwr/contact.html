<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description" content="Contact White Water Rafting for adventures at Victoria Falls, Zimbabwe.">
    <meta name="author" content="Brain Victor Murara">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/site-logo.png" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us | White Water Rafting</h1>

        <section class="contact-details">
            <div class="company-info">
                <h2>Visit Our Victoria Falls Outpost</h2>
                <p>📍 Victoria Falls, Zimbabwe</p>
                <p>📞 +263 123 456 789</p>
                <p>✉️ info@whitewaterrafting.co.zw</p>
                
                <div class="map-container">
  <iframe src="https://www.google.com/maps/embed?..." width="600" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>
        </section>

        <section class="team">
            <h2>Meet Our Guides</h2>
            <div class="employee-profiles">
                <figure>
                    <img src="images/employee1.jpg" alt="Portrait of Alex Riverton, Manager">
                    <figcaption>Alex Riverton - Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Portrait of Sarah Splash, Lead Guide">
                    <figcaption>Sarah Splash - Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Portrait of Buck Oarman, Safety Specialist">
                    <figcaption>Buck Oarman - Safety Specialist</figcaption>
                </figure>
            </div>
        </section>

        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <label for="username">Full Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="useremail">Email Address:</label>
                <input type="email" id="useremail" name="useremail" required>

                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label><input type="radio" id="general" name="purpose" value="general"> General Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose" value="reservation"> Reservation Question</label>
                    <label><input type="radio" id="suggestion" name="purpose" value="suggestion"> Website Suggestion</label>
                </fieldset>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5"></textarea>

                <label class="newsletter">
                    <input type="checkbox" id="subscribe" name="subscribe"> Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>©2026 | Brain Victor Murara | White Water Rafting</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Follow us on Facebook"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.png" alt="Follow us on LinkedIn"></a>
            <a href="https://instagram.com"><img src="images/instagram.png" alt="Follow us on Instagram"></a>
        </nav>
    </footer>
</body>
</html>
