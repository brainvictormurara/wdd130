            <a href="trips.html">Trips</a>

        </nav>
    </header>

    <main>
       <section class="contact-grid">
    <div class="company-info">
        <h2>Visit Us</h2>
        <p>📍 378 N Main St, Moab, UT 84532</p>
        <p>📞 435-259-8594</p>
        <p>✉️ info@adrift.net</p>
        
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3106.965449557008!2d-109.55325782346764!3d38.57551417189445!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87480ee1ffef7f93%3A0x2c47924687940706!2sAdrift%20Adventures%20Moab!5e0!3m2!1sen!2sus!4v1711750000000!5m2!1sen!2sus" 
                width="600" 
                height="450" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>
</section>
<section class="team">
    <h2>Meet Our Guides</h2>
    <div class="employee-profiles">
        <figure>
            <img src="images/employee1.jpg" alt="Manager">
            <figcaption><strong>Alex Riverton</strong> - Expedition Manager</figcaption>
        </figure>
        <figure>
            <img src="images/employee2.jpg" alt="Lead Guide">
            <figcaption><strong>Sarah Splash</strong> - Senior River Guide</figcaption>
        </figure>
        <figure>
            <img src="images/employee3.jpg" alt="Safety Lead">
            <figcaption><strong>Buck Oarman</strong> - Safety Specialist</figcaption>
        </figure>
    </div>
</section>
<section class="contact-form">
    <h2>Send Us a Message</h2>
    <form action="#" method="post">
        <label for="username">Full Name:</label>
        <input type="text" id="username" name="username" required>

        <label for="useremail">Email Address:</label>
        <input type="email" id="useremail" name="useremail" required>

        <fieldset>
            <legend>Purpose of Message</legend>
            <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
            <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
            <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
        </fieldset>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5"></textarea>

        <label class="newsletter">
            <input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter
        </label>

        <button type="submit">Submit Inquiry</button>
    </form>
</section>
              
    </main>
