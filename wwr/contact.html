<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Dry Oar Rafting</title>
    <meta name="description" content="Contact Dry Oar Rafting for adventures at Victoria Falls, Zimbabwe. Reach out for inquiries, reservations, or feedback.">
    <meta name="author" content="Brain Victor Murara">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="images/site-logo.png" alt="Dry Oar Rafting Logo" class="logo">
        </div>
        <nav class="nav-container">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Contact Us</h1>

        <section class="contact-details home-grid">
            <div class="company-info card">
                <h2>Visit Our Victoria Falls Outpost</h2>
                
                <img src="images/history-raft.jpg" alt="Rafting at Victoria Falls" style="width: 100%; height: auto; margin-bottom: 15px; border-radius: 4px;">
                
                <p>📍 Victoria Falls, Zimbabwe</p>
                <p>📞 +263 123 456 789</p>
                <p>✉️ info@dryoarrafting.co.zw</p>
            </div>
            
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?..." ...></iframe>
            </div>
        </section>
        <section class="team">
            <h2 style="text-align: center; margin-top: 40px;">Meet Our Guides</h2>
            <div class="employee-profiles home-grid">
                <figure class="card">
                    <img src="images/employee1.jpg" alt="Alex Riverton, Manager">
                    <figcaption>Alex Riverton - Manager</figcaption>
                </figure>
                <figure class="card">
                    <img src="images/employee2.jpg" alt="Sarah Splash, Lead Guide">
                    <figcaption>Sarah Splash - Lead Guide</figcaption>
                </figure>
                <figure class="card">
                    <img src="images/employee3.jpg" alt="Buck Oarman, Safety Specialist">
                    <figcaption>Buck Oarman - Safety Specialist</figcaption>
                </figure>
            </div>
        </section>

        <section class="contact-form card">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <div class="form-item">
                    <label for="username">Full Name:</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-item">
                    <label for="useremail">Email Address:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>

                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
                </fieldset>

                <div class="form-item">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5"></textarea>
                </div>

                <label class="newsletter-check">
                    <input type="checkbox" id="subscribe" name="subscribe"> Please subscribe me to the monthly newsletter
                </label>

                <button type="submit"></button>
                </main> <footer>
        <p>© 2026 Dry Oar Rafting | Brain Victor Murara</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.png" alt="Instagram icon"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.png" alt="LinkedIn icon"></a>
        </nav>
    </footer>
</body>
</html>
